<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
    content="width=device-width,
     initial-scale=1.0">
    <title>estudo de iframe</title>
    <style>
        iframe {border: 4px solid black;}
    </style>
</head>


<body>
    <!--2 opções para chegar a um endereço externo
        1 link 2 iframe -->
    <h1>testando o uso de iframes</h1>
    <p>acessando o site do
     <a href="https://www.cursoemvideo.com" 
     target="_blank">cursoemvideo</a>,
     para aprender a programar.
    </p>

    <p><!--por padrao o tamanho do 
        iframe e 300 por 150px-->acessando o site do
     <iframe src="https://www.cursoemvideo.com"
      frameborder="0">

     </iframe>
     para aprender a programar.
    </p>

</body>

</html>
