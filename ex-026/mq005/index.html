<!DOCTYPE html>
<html lang="pt-br">
<head>

            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>

         function clickmenu(){
            if (itens.style.display == "block") {

            else{
            itens.style.display = "block"
            }
         }
    </script>
