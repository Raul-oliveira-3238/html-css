<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, 
    initial-scale=1.0">
    <title>tabelas</title>
    <STyle>
        body {font-family: Arial, Helvetica,
             sans-serif;}

        table {width: 500px; border-collapse: separate;}
        td,th {border: 1px solid black;padding: 10px;}
        th,tfoot {background-color: rgb(54, 53, 53);color: white;}
        td.num {text-align: right;}

    </STyle>
</head>


<body>
    <h1>tabelas grandes</h1>
    <!-- hierarquia de tabela 
         tabela = table
               table row = linha de tabela
               table data = dados da tabela  -->  
    <table>
        <header>
            <tr>
                <th>estado</th>
                <th>população</th>
            </tr>
        </header>
        
        <tbody>
            <td>sao paulo</td>
            <td class="num">49 919 049</td>
        </tbody>

        <tfoot>
            <th>total de habitantes</th>
            <td class="num">0000000</td>
        </tfoot>
    </table>         
</body>

</html>
