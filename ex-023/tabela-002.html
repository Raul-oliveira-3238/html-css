<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, 
    initial-scale=1.0">
    <title>tabelas</title>
    <STyle>
        body {font-family: Arial, Helvetica,
             sans-serif;}

        table {width: 530px; border-collapse: separate;}
        td,th {border: 1px solid black;padding: 10px;}
        th,tfoot {background-color: rgb(54, 53, 53);color: white;}
        td.num {text-align: right;}
        caption { background-color: rgb(105, 101, 101); font-size: 1.5em;
        font-weight: bold; padding: 10px;}

    </STyle>
</head>


<body>
    <h1>uso de tabelas grandes</h1>
    <!-- anatomia de tabelas grandes 
         tabela = table
         caption=legenda da tabela 
            thead
                tr= tabela linha, td=tabela dados, th=
            tbody
                tr, td,th
            tfoot
                tr, td, th -->  
    <table>
        <caption>população das unidades federativas </caption>
        <thead>
            <tr>
                <th scope="col">estado</th>
                <th scope="col"style="width: 50px;">população</th>
            </tr>
        </thead>
        
        <tbody>
            <td>sao paulo</td>
            <td class="num">49 919 049</td>
        </tbody>

        <tfoot>
            <th scope="row">total de habitantes</th>
            <td class="num">0000000</td>
        </tfoot>
    </table>         
</body>

</html>
