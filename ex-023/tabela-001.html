<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, 
    initial-scale=1.0">
    <title>tabelas</title>
    <STyle>
        body {font-family: Arial, Helvetica,
             sans-serif;}

        table {width: 400px;
        border-collapse: separate;}

        td {border: 1px solid black;
           padding: 10px;}
        tr.linha{background-color: aqua;}
        td.dado{background-color: yellow;}

    </STyle>
</head>


<body>
    <h1>minha primeira tabela concluida!</h1>
    <!-- hierarquia de tabela 
         tabela = table
               table row = linha de tabela
               table data = dados da tabela  -->
    <table>
        <tr class= "linha"> <!--primeira linha da tabela-->
            <td>A1</td>
            <td>A2</td>
            <td>A3</td>
        </tr>
        <tr> <!--segunda linha da tabela-->
            <td>B1</td>
            <td>B2</td>
            <td>B3</td>
        </tr>
        <tr> <!--TERCEIRA LINHA  linha da tabela-->
            <td>C1</td>
            <td>C2</td>
            <td class="dado">C3</td>
        </tr>
    </table>           
</body>

</html>
