<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, 
    initial-scale=1.0">
    <title>exercicio-003</title>
    <STYle>
        body {font-family: Arial, Helvetica, sans-serif;
             border: 1px
            solid black ;}
        
        table {border-collapse: collapse;}

        td {border: 1px solid black ;padding: 10px;
             width: 300px;
            text-align: center;}

    </STYle>
</head>

<body>
    <h1>Mesclagem de celulas</h1>

    <table>
        <tr>
            <td>
                A
            </td>
            
            <td colspan="2"> <!-- colspan traduzindo espanção de colunas
                configuração para mesclar celulas nas colunas, dentro
                da tag digite "colspan="quantidade de celulas a mesclar" "-->
                B
            </td>
            
        </tr>
        <tr>
            <td rowspan="3"><!--rowspan traduzindo espansão de linhas, 
                configuração para mesclar celulas nas linhas , dentro
                da tag digite "rowspan="quantidade de celulas a mesclar"-->
                D
            </td>
            <td>E</td>
            <td>f</td>
        </tr>
        <tr>
            <td>H</td>
            <td>I</td>
        </tr>
        <tr>
            <td>K</td>
            <td>L</td>
        </tr>
    </table>
</body>

</html>
