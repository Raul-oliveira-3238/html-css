<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario-003</title>
</head>

<body>
    <h1>teste de formulario</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
    <p>
        <label for="inome">nome</label>
        <input type="text" name="nome" id="inome" required min="4" maxlength="30"
        placeholder="nome completo" autocomplete="name"
    </p>

    <p>
        <label for="imedia">media</label>
        <input type="number" name="media" id="imedia" min="0" max="10"
        placeholder="0 a 10" step="0.1">
    </p>

    <p>
        <label for="imes">perildo letivo</label>
        <input type="month" name="mes" id="imes" value="2026-04">
    </p>

    <p>
        <label for="idia">dia da prova </label>
        <input type="month" name="dia" id="dia">
    </p>

    <p>
        <input type="submit" value="enviar">
        <input type="reset" value="limpar">
    </p>
    </form>
</body>
</html>
