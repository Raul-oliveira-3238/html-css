<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario-004</title>
</head>

<body>
    <h1>exemplo de formulario</h1>
    <form action="cadastro.php" method="get">
        <p>
            <label for="iemail">e-mail</label>
            <input type="email" name="email" id="iemail" autocomplete="email" required>
        </p>
        <p>
            <label for="itel">telefone</label>
            <input type="tel" name="tel" id="itel" autocomplete="tel" 
            pattern="[0-9]{4-[0-9]{4}$" required>
            <!--estudar mais sobre regex-->
        </p>
        <p>
            <input type="submit" value="enviar">
            <input type="reset" value="limpar"
        </p>
    </form>
</body>
</html>
